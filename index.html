<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pragashri — Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { width: 480px; padding: 40px 20px; }
  .greeting { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #888; margin-bottom: 32px; }
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .card { background: #fff; border-radius: 12px; border: 0.5px solid #e0e0e0; padding: 20px; text-decoration: none; color: #1a1a1a; display: block; transition: box-shadow 0.15s; }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
  .card-icon { font-size: 24px; margin-bottom: 10px; }
  .card-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .card-desc { font-size: 11px; color: #888; line-height: 1.5; }
  .footer { margin-top: 32px; font-size: 11px; color: #bbb; text-align: center; }
</style>
</head>
<body>
<div class="container">
  <div class="greeting">Hey there 👋</div>
  <div class="sub">Who are you?</div>

  <div class="cards">
    <a class="card" href="leetcode.html?user=pragashri">
      <div class="card-icon">👩‍💻</div>
      <div class="card-title">Pragashri</div>
      <div class="card-desc">Open your personal LeetCode tracker</div>
    </a>
    <a class="card" href="leetcode.html?user=jay">
      <div class="card-icon">👨‍💻</div>
      <div class="card-title">Jay</div>
      <div class="card-desc">Open your personal LeetCode tracker</div>
    </a>
  </div>

  <div style="margin-top:14px">
    <a class="card" href="resume.html" style="display:block">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="card-icon" style="margin:0">📄</div>
        <div>
          <div class="card-title">Pragashri's Resume</div>
          <div class="card-desc">View and print the updated 2-page resume</div>
        </div>
      </div>
    </a>
  </div>

  <div class="footer">Progress saved per person · no internet needed</div>
</div>
</body>
</html>
