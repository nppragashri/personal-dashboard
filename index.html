<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    background: #f0f2f5;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .container {
    width: 100%;
    max-width: 460px;
  }

  .hero {
    text-align: center;
    margin-bottom: 36px;
  }

  .hero-icon {
    width: 56px; height: 56px;
    background: #111;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    margin: 0 auto 16px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  }

  .hero h1 {
    font-size: 22px;
    font-weight: 700;
    color: #111;
    letter-spacing: -0.3px;
  }

  .hero p {
    font-size: 13px;
    color: #888;
    margin-top: 4px;
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #9ca3af;
    margin-bottom: 10px;
    padding-left: 2px;
  }

  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .card {
    background: #fff;
    border-radius: 14px;
    border: 1px solid #e5e7eb;
    padding: 20px 18px;
    text-decoration: none;
    color: #111;
    display: block;
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    cursor: pointer;
  }

  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    border-color: #d1d5db;
  }

  .card:active { transform: translateY(0); }

  .card-icon {
    font-size: 26px;
    margin-bottom: 10px;
    display: block;
  }

  .card-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .card-desc {
    font-size: 11px;
    color: #9ca3af;
    line-height: 1.5;
  }

  .card-wide {
    background: #fff;
    border-radius: 14px;
    border: 1px solid #e5e7eb;
    padding: 18px 20px;
    text-decoration: none;
    color: #111;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    margin-bottom: 12px;
  }

  .card-wide:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    border-color: #d1d5db;
  }

  .card-wide:active { transform: translateY(0); }

  .card-wide-icon {
    font-size: 26px;
    flex-shrink: 0;
  }

  .card-wide-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 3px;
  }

  .card-wide-desc {
    font-size: 11px;
    color: #9ca3af;
    line-height: 1.5;
  }

  .arrow {
    margin-left: auto;
    font-size: 16px;
    color: #d1d5db;
    flex-shrink: 0;
  }

  .footer {
    margin-top: 28px;
    font-size: 11px;
    color: #c4c8d0;
    text-align: center;
  }
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="hero-icon">🏠</div>
    <h1>Hey there 👋</h1>
    <p>Who are you?</p>
  </div>

  <div class="section-label">LeetCode Trackers</div>
  <div class="cards">
    <a class="card" href="leetcode.html?user=pragashri">
      <span class="card-icon">👩‍💻</span>
      <div class="card-title">Pragashri</div>
      <div class="card-desc">Open your personal LeetCode tracker</div>
    </a>
    <a class="card" href="leetcode.html?user=jay">
      <span class="card-icon">👨‍💻</span>
      <div class="card-title">Jay</div>
      <div class="card-desc">Open your personal LeetCode tracker</div>
    </a>
  </div>

  <div class="section-label" style="margin-top:20px">Other</div>
  <a class="card-wide" href="resume.html">
    <span class="card-wide-icon">📄</span>
    <div>
      <div class="card-wide-title">Pragashri's Resume</div>
      <div class="card-wide-desc">View and print the updated 2-page resume</div>
    </div>
    <span class="arrow">›</span>
  </a>

  <div class="footer">Progress saved per person · synced to cloud</div>
</div>
</body>
</html>
