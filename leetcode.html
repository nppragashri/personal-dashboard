<style>

  h1 { font-size: 18px; font-weight: 500; }
  .sub { font-size: 12px; color: #888; margin-top: 3px; }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
  .stat-num { font-size: 22px; font-weight: 500; text-align: right; }
  .stat-lbl { font-size: 11px; color: #888; text-align: right; }
  .progress-wrap { height: 6px; background: #e5e5e5; border-radius: 3px; margin-bottom: 18px; }
  .progress-fill { height: 6px; background: #1d9e75; border-radius: 3px; transition: width 0.3s; }
  .filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-btn { font-size: 11px; padding: 4px 12px; border-radius: 20px; border: 0.5px solid #ccc; background: transparent; color: #666; cursor: pointer; }

  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 7px 10px; font-size: 11px; font-weight: 500; color: #888; border-bottom: 0.5px solid #e0e0e0; background: #f7f7f7; }
  td { padding: 9px 10px; border-bottom: 0.5px solid #efefef; font-size: 12px; }
  tr.week-row { cursor: pointer; }
  tr.week-row:hover td { background: #f9f9f9; }
  tr.phase-row td { background: #f3f3f3; font-size: 10px; font-weight: 500; letter-spacing: 0.6px; text-transform: uppercase; color: #888; padding: 6px 10px; }
  tr.problem-row td { background: #fff; }
  tr.problem-row.done td { background: #f6fbf3; }
  tr.problem-row.done .p-name { text-decoration: line-through; color: #aaa; }
  .badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
  .badge.E { background: #eaf3de; color: #3b6d11; }
  .badge.M { background: #faeeda; color: #854f0b; }
  .badge.H { background: #fcebeb; color: #a32d2d; }
  .week-done { font-size: 11px; font-weight: 500; }
  .week-done.full { color: #3b6d11; }
  a { color: #185fa5; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .footer { margin-top: 16px; font-size: 11px; color: #aaa; text-align: center; }
  input[type=checkbox] { cursor: pointer; width: 14px; height: 14px; }
</style>
</head>

const TOTAL = plan.reduce((s,w)=>s+w.problems.length,0);
const params = new URLSearchParams(window.location.search);
const user = params.get("user") || "pragashri";
const userName = user === "jay" ? "Jay" : "Pragashri";
const KEY = `lc_done_${user}`;
const EXP_KEY = `lc_expanded_${user}`;

document.title = `${userName} — LeetCode Tracker`;

let done = JSON.parse(localStorage.getItem(KEY)||"{}");
let expanded = JSON.parse(localStorage.getItem(EXP_KEY)||"{}");
let activeFilter = "All";

function save(){ localStorage.setItem(KEY, JSON.stringify(done)); }
function saveExp(){ localStorage.setItem(EXP_KEY, JSON.stringify(expanded)); }

function doneCount(){ return Object.values(done).filter(Boolean).length; }

function updateProgress(){
  const n = doneCount();
  const pct = Math.round(n/TOTAL*100);
  document.getElementById("stat-num").textContent = n+" / "+TOTAL;
  document.getElementById("stat-lbl").textContent = "problems done · "+pct+"%";
  document.getElementById("progress-fill").style.width = pct+"%";
}

function render(){
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";
  let lastPhase = "";

  plan.forEach(w => {
    if(activeFilter !== "All" && w.phase !== activeFilter) return;

    if(w.phase !== lastPhase){
      lastPhase = w.phase;
      const tr = document.createElement("tr");
      tr.className = "phase-row";
      tr.innerHTML = `<td colspan="5">${w.phase}</td>`;
      tbody.appendChild(tr);
    }

    const wDone = w.problems.filter((_,i)=>done[`${w.week}-${i}`]).length;
    const isOpen = expanded[w.week];
    const tr = document.createElement("tr");
    tr.className = "week-row";
    tr.innerHTML = `
      <td><b>W${w.week}</b></td>
      <td style="font-weight:500">${w.topic}</td>
      <td style="color:#888;white-space:nowrap">Days ${w.days}</td>
      <td style="color:#888">${w.problems.length} problems &nbsp;${isOpen?"▲":"▼"}</td>
      <td class="week-done${wDone===w.problems.length?" full":""}">${wDone}/${w.problems.length}</td>`;
    tr.onclick = () => {
      expanded[w.week] = !expanded[w.week];
      saveExp();
      render();
    };
    tbody.appendChild(tr);

    if(isOpen){
      w.problems.forEach((p,i)=>{
        const key = `${w.week}-${i}`;
        const isDone = !!done[key];
        const ptr = document.createElement("tr");
        ptr.className = "problem-row"+(isDone?" done":"");
        ptr.innerHTML = `
          <td style="padding-left:24px"><input type="checkbox" ${isDone?"checked":""} data-key="${key}"></td>
          <td colspan="2" class="p-name"><a href="${p.link}" target="_blank">${p.name} ↗</a></td>
          <td><span class="badge ${p.diff}">${p.diff==="E"?"Easy":p.diff==="M"?"Med":"Hard"}</span></td>
          <td></td>`;
        ptr.querySelector("input").addEventListener("change", function(e){
          e.stopPropagation();
          done[this.dataset.key] = this.checked;
          save();
          updateProgress();
          render();
        });
        tbody.appendChild(ptr);
      });
    }
  });
  updateProgress();
}

function buildFilters(){
  const phases = ["All","Phase 1 — Foundations","Phase 2 — Core DS","Phase 3 — Graphs & DP","Phase 4 — Polish & Mock"];
  const labels = ["All","Phase 1","Phase 2","Phase 3","Phase 4"];
  const wrap = document.getElementById("filters");
  phases.forEach((p,i)=>{
    const btn = document.createElement("button");
    btn.className = "filter-btn"+(p===activeFilter?" active":"");
    btn.textContent = labels[i];
    btn.onclick = ()=>{
      activeFilter = p;
      document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      render();
    };
    wrap.appendChild(btn);
  });
}

buildFilters();
render();

document.getElementById("page-title").textContent = `${userName}'s LeetCode Tracker`;
document.getElementById("page-sub").textContent = `Neetcode 150 · 2 problems/day · ${userName}'s personal progress`;
