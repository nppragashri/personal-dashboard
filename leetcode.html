<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeetCode Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #07070f;
    --surface: #0e0e1c;
    --surface-2: #13132a;
    --surface-3: #0b0b18;
    --border: rgba(255,255,255,0.07);
    --border-2: rgba(255,255,255,0.04);
    --cyan: #22d3ee;
    --cyan-glow: rgba(34,211,238,0.2);
    --purple: #a78bfa;
    --purple-glow: rgba(167,139,250,0.2);
    --green: #34d399;
    --green-glow: rgba(52,211,153,0.15);
    --amber: #fbbf24;
    --red: #f87171;
    --text: #e2e8f0;
    --text-2: #94a3b8;
    --muted: #475569;
    --muted-2: #1e293b;
  }

  body {
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    font-size: 13px;
    color: var(--text);
    background-color: var(--bg);
    background-image:
      linear-gradient(rgba(34,211,238,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(34,211,238,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    min-height: 100vh;
  }

  /* ── STICKY HEADER ── */
  .header {
    position: sticky;
    top: 0; z-index: 100;
    background: rgba(7,7,15,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  /* left glow line on header */
  .header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), var(--purple), transparent);
    opacity: 0.5;
  }

  .header-left { display: flex; align-items: center; gap: 16px; min-width: 0; }

  .back-link {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--muted);
    text-decoration: none;
    white-space: nowrap; flex-shrink: 0;
    transition: color 0.15s;
    display: flex; align-items: center; gap: 4px;
  }
  .back-link:hover { color: var(--cyan); }

  .header-title-block {}
  .header-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; color: var(--cyan);
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 2px; opacity: 0.8;
  }
  .header-title {
    font-size: 15px; font-weight: 700;
    color: #fff; letter-spacing: -0.3px;
    white-space: nowrap;
  }

  .header-right { display: flex; align-items: center; gap: 16px; flex-shrink: 0; }

  /* Streak */
  .streak-badge {
    display: flex; align-items: center; gap: 6px;
    background: rgba(251,191,36,0.08);
    border: 1px solid rgba(251,191,36,0.25);
    border-radius: 100px; padding: 5px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 500; color: var(--amber);
    white-space: nowrap;
    box-shadow: 0 0 16px rgba(251,191,36,0.08);
  }

  /* Stat block */
  .stat-block { text-align: right; }
  .stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px; font-weight: 500; color: #fff;
    line-height: 1; letter-spacing: -1px;
  }
  .stat-sub { font-size: 10px; color: var(--muted); margin-top: 3px; letter-spacing: 0.3px; }

  /* Progress ring */
  .ring-wrap { position: relative; width: 52px; height: 52px; flex-shrink: 0; }
  .ring-wrap svg { transform: rotate(-90deg); display: block; }
  .ring-bg { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 4; }
  .ring-fill {
    fill: none; stroke: var(--cyan); stroke-width: 4;
    stroke-linecap: round;
    stroke-dasharray: 119.38;
    stroke-dashoffset: 119.38;
    transition: stroke-dashoffset 0.6s cubic-bezier(0.4,0,0.2,1), stroke 0.4s;
    filter: drop-shadow(0 0 4px var(--cyan));
  }
  .ring-text {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 500; color: var(--text);
  }

  /* Progress bar */
  .progress-bar-wrap { height: 2px; background: rgba(255,255,255,0.05); }
  .progress-bar-fill {
    height: 2px;
    background: linear-gradient(90deg, var(--cyan), var(--purple));
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 8px rgba(34,211,238,0.4);
  }

  /* ── MAIN ── */
  .main { max-width: 920px; margin: 0 auto; padding: 28px 24px; }

  /* User tabs */
  .user-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
  .user-tab {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px; font-weight: 600;
    padding: 8px 22px; border-radius: 100px;
    border: 1px solid var(--border);
    cursor: pointer; background: var(--surface); color: var(--muted);
    transition: all 0.18s;
  }
  .user-tab:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
  .user-tab.active {
    background: rgba(34,211,238,0.1);
    color: var(--cyan);
    border-color: rgba(34,211,238,0.3);
    box-shadow: 0 0 20px rgba(34,211,238,0.1);
  }

  /* Sync bar */
  .sync-bar {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 16px;
  }
  .sync-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 500;
    padding: 6px 14px; border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface-2);
    cursor: pointer; color: var(--text-2);
    transition: all 0.15s;
  }
  .sync-btn:hover {
    background: rgba(34,211,238,0.07);
    border-color: rgba(34,211,238,0.25);
    color: var(--cyan);
  }
  .sync-status { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); margin-left: 2px; }
  .sync-status.ok { color: var(--green); }
  .sync-status.err { color: var(--red); }

  /* Filters */
  .filters { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 500;
    padding: 5px 16px; border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--surface); color: var(--muted); cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
  .filter-btn.active {
    background: rgba(34,211,238,0.1);
    color: var(--cyan);
    border-color: rgba(34,211,238,0.3);
    box-shadow: 0 0 16px rgba(34,211,238,0.1);
  }

  /* Table card */
  .table-wrap {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  table { width: 100%; border-collapse: collapse; }

  th {
    text-align: left; padding: 10px 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 500; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px;
    background: var(--surface-3);
    border-bottom: 1px solid var(--border);
  }

  /* Phase row */
  tr.phase-row td {
    padding: 8px 18px;
    background: rgba(34,211,238,0.03);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .phase-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 500;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--cyan); opacity: 0.7;
  }

  /* Week row */
  tr.week-row { cursor: pointer; transition: background 0.12s; }
  tr.week-row td { padding: 14px 18px; border-bottom: 1px solid var(--border-2); vertical-align: middle; }
  tr.week-row:hover td { background: rgba(255,255,255,0.025); }
  tr.week-row.complete td { background: rgba(52,211,153,0.04); }
  tr.week-row.complete:hover td { background: rgba(52,211,153,0.07); }
  tr.week-row.complete { border-left: 2px solid var(--green); }

  .week-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 500;
    color: var(--muted); letter-spacing: 0.5px;
  }

  .week-topic { font-size: 13px; font-weight: 600; color: var(--text); }

  .week-bar-wrap {
    height: 3px; background: rgba(255,255,255,0.06);
    border-radius: 2px; margin-top: 6px; min-width: 80px;
  }
  .week-bar-fill {
    height: 3px; border-radius: 2px; background: var(--cyan);
    transition: width 0.4s ease;
  }
  .week-bar-fill.full { background: var(--green); box-shadow: 0 0 6px rgba(52,211,153,0.4); }

  .week-days {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--muted); white-space: nowrap;
  }

  .week-count-wrap { display: flex; align-items: center; gap: 6px; }
  .week-count { font-size: 11px; color: var(--muted); }
  .expand-chevron { font-size: 10px; color: var(--muted); transition: transform 0.2s; display: inline-block; }
  .expand-chevron.open { transform: rotate(180deg); }

  .done-pill {
    display: inline-flex; align-items: center; gap: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 500;
    padding: 3px 12px; border-radius: 100px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--muted);
    white-space: nowrap;
  }
  .done-pill.full {
    background: rgba(52,211,153,0.08);
    border-color: rgba(52,211,153,0.25);
    color: var(--green);
    box-shadow: 0 0 12px rgba(52,211,153,0.1);
  }

  /* Problem row */
  tr.problem-row td {
    padding: 10px 18px;
    border-bottom: 1px solid var(--border-2);
    background: var(--surface-3);
    vertical-align: middle;
  }
  tr.problem-row:last-child td { border-bottom: none; }
  tr.problem-row.done td { background: rgba(52,211,153,0.03); }
  tr.problem-row.done .p-name { text-decoration: line-through; color: var(--muted); }

  .p-name { font-size: 12px; color: var(--text-2); }
  .p-link { color: var(--cyan); text-decoration: none; transition: color 0.12s, text-shadow 0.12s; }
  .p-link:hover { color: #fff; text-shadow: 0 0 12px rgba(34,211,238,0.6); }

  /* Difficulty badges */
  .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 500;
    padding: 3px 10px; border-radius: 6px; display: inline-block;
  }
  .badge.E { background: rgba(52,211,153,0.1); color: var(--green); border: 1px solid rgba(52,211,153,0.25); }
  .badge.M { background: rgba(251,191,36,0.1); color: var(--amber); border: 1px solid rgba(251,191,36,0.25); }
  .badge.H { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.25); }

  input[type=checkbox] {
    cursor: pointer; width: 15px; height: 15px;
    accent-color: var(--cyan); flex-shrink: 0;
  }

  /* Footer */
  .footer {
    margin-top: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--muted);
    text-align: center;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .footer::before, .footer::after {
    content: ''; height: 1px; width: 40px;
    background: var(--muted-2);
  }
  .footer a { color: var(--muted); text-decoration: none; transition: color 0.15s; }
  .footer a:hover { color: var(--cyan); }

  /* Fruit badge */
  .fruit-badge {
    display: flex; align-items: center; gap: 6px;
    border-radius: 100px; padding: 5px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 500;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .fruit-badge.strawberry {
    background: rgba(244,63,94,0.08);
    border: 1px solid rgba(244,63,94,0.25);
    color: #fb7185;
    box-shadow: 0 0 14px rgba(244,63,94,0.08);
  }
  .fruit-badge.guava {
    background: rgba(132,204,22,0.08);
    border: 1px solid rgba(132,204,22,0.3);
    color: #a3e635;
    box-shadow: 0 0 14px rgba(132,204,22,0.08);
  }

  /* Floating fruit */
  @keyframes fruitFloat {
    0%   { opacity: 1; transform: translateY(0) scale(1.3); }
    70%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(-72px) scale(0.7); }
  }
  .fruit-float {
    position: fixed;
    font-size: 15px; font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    pointer-events: none; z-index: 9999;
    animation: fruitFloat 1.1s ease-out forwards;
    white-space: nowrap; text-shadow: 0 0 10px currentColor;
  }

  /* Surprise popup */
  .surprise-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 10000;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .surprise-overlay.show { opacity: 1; pointer-events: all; }

  .surprise-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 44px 56px 36px;
    text-align: center;
    position: relative;
    overflow: hidden;
    min-width: 300px;
    transform: scale(0.4) rotate(-6deg);
    opacity: 0;
    transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s ease;
  }
  .surprise-overlay.show .surprise-card {
    transform: scale(1) rotate(0deg);
    opacity: 1;
  }

  .surprise-bg-fruit {
    position: absolute;
    pointer-events: none;
    opacity: 0.1;
    font-size: 28px;
    animation: bgSpin 6s linear infinite;
  }
  @keyframes bgSpin {
    from { transform: rotate(0deg) scale(1); }
    to   { transform: rotate(360deg) scale(1.1); }
  }

  .surprise-main-emoji {
    font-size: 80px;
    display: block;
    margin-bottom: 14px;
    animation: fruitWobble 0.5s ease infinite alternate;
  }
  @keyframes fruitWobble {
    from { transform: rotate(-10deg) scale(1); }
    to   { transform: rotate(10deg) scale(1.12); }
  }

  .surprise-pts {
    font-family: 'JetBrains Mono', monospace;
    font-size: 38px; font-weight: 700; line-height: 1;
    margin-bottom: 10px;
  }
  .surprise-pts.strawberry { color: #fb7185; text-shadow: 0 0 24px rgba(251,113,133,0.6); }
  .surprise-pts.guava      { color: #a3e635; text-shadow: 0 0 24px rgba(163,230,53,0.6); }

  .surprise-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 500;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .surprise-msg {
    font-size: 20px; font-weight: 700;
    color: #fff; letter-spacing: -0.3px;
  }

  .surprise-dismiss {
    margin-top: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--muted);
    letter-spacing: 1px;
    animation: blinkKey 1.2s step-end infinite;
  }
  @keyframes blinkKey { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

  /* Toast */
  .toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface);
    border: 1px solid rgba(34,211,238,0.25);
    color: var(--text);
    border-radius: 12px; padding: 12px 22px;
    font-size: 13px; font-weight: 500;
    box-shadow: 0 0 40px rgba(34,211,238,0.1), 0 16px 48px rgba(0,0,0,0.5);
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 9999; pointer-events: none; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Empty state */
  .empty-row td {
    padding: 48px; text-align: center;
    color: var(--muted); font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
  }

  @media (max-width: 640px) {
    .header { padding: 10px 16px; }
    .header-title { font-size: 13px; }
    .stat-num { font-size: 16px; }
    .streak-badge { display: none !important; }
    th:nth-child(3), td:nth-child(3) { display: none; }
    .main { padding: 20px 14px; }
  }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="surprise-overlay" id="surprise-overlay" onclick="hideSurprisePopup()">
  <div class="surprise-card" id="surprise-card">
    <div id="surprise-bg-fruits"></div>
    <span class="surprise-main-emoji" id="surprise-main-emoji">🍓</span>
    <div class="surprise-pts strawberry" id="surprise-pts">+1 pts</div>
    <div class="surprise-label" id="surprise-label">strawberry earned</div>
    <div class="surprise-msg" id="surprise-msg">YUMMY!</div>
    <div class="surprise-dismiss">[ tap to close ]</div>
  </div>
</div>

<!-- Sticky header -->
<div class="header">
  <div class="header-left">
    <a class="back-link" href="index.html">← back</a>
    <div class="header-title-block">
      <div class="header-eyebrow">// TRACKER</div>
      <div class="header-title" id="page-title">LeetCode Tracker</div>
    </div>
  </div>
  <div class="header-right">
    <div class="fruit-badge strawberry" id="fruit-badge">
      🍓 <span id="fruit-count">0</span> pts
    </div>
    <div class="streak-badge" id="streak-badge" style="display:none">
      🔥 <span id="streak-count">0</span>wk streak
    </div>
    <div class="stat-block">
      <div class="stat-num" id="stat-num">0 / 150</div>
      <div class="stat-sub" id="stat-lbl">0% complete</div>
    </div>
    <div class="ring-wrap">
      <svg width="52" height="52" viewBox="0 0 48 48">
        <circle class="ring-bg" cx="24" cy="24" r="19"/>
        <circle class="ring-fill" id="ring-fill" cx="24" cy="24" r="19"/>
      </svg>
      <div class="ring-text" id="ring-pct">0%</div>
    </div>
  </div>
</div>
<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progress-bar-fill" style="width:0%"></div>
</div>

<!-- Main content -->
<div class="main">

  <div class="user-tabs">
    <button class="user-tab" id="tab-pragashri" onclick="switchUser('pragashri')">👩‍💻 Pragashri</button>
    <button class="user-tab" id="tab-jay" onclick="switchUser('jay')">👨‍💻 Jay</button>
  </div>

  <div class="sync-bar">
    <button class="sync-btn" onclick="saveToCloud()">☁ save_to_cloud()</button>
    <button class="sync-btn" onclick="loadFromCloud()">↻ refresh()</button>
    <span class="sync-status" id="sync-status">awaiting sync...</span>
  </div>

  <div class="filters" id="filters"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Week</th>
          <th>Topic</th>
          <th>Days</th>
          <th>Problems</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="footer">
    synced · firebase · <a href="https://neetcode.io/practice" target="_blank">neetcode.io ↗</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBF5J5ajywUS-_7K2CdOyqJY_wPzBW9oSY",
  authDomain: "personal-dashboard-f54b1.firebaseapp.com",
  projectId: "personal-dashboard-f54b1",
  storageBucket: "personal-dashboard-f54b1.firebasestorage.app",
  messagingSenderId: "600298856164",
  appId: "1:600298856164:web:7ed5f816b60a5ff9edd6f1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
window._db = db;
window._firestore = { doc, setDoc, getDoc };

const plan = [
  { week:1, topic:"Arrays & Hashing", days:"1–7", phase:"Phase 1 — Foundations", problems:[
    {name:"Contains Duplicate",diff:"E",link:"https://leetcode.com/problems/contains-duplicate/"},
    {name:"Valid Anagram",diff:"E",link:"https://leetcode.com/problems/valid-anagram/"},
    {name:"Two Sum",diff:"E",link:"https://leetcode.com/problems/two-sum/"},
    {name:"Group Anagrams",diff:"M",link:"https://leetcode.com/problems/group-anagrams/"},

window._plan = plan;

const TOTAL = plan.reduce((s, w) => s + w.problems.length, 0);
const CIRCUMFERENCE = 2 * Math.PI * 19;

window._done = {};
window._expanded = {};
window._currentUser = "pragashri";
let activeFilter = "All";

// ── Fruit system ──
const FRUIT_MAP = {
  pragashri: { emoji: "🍓", name: "strawberry", cls: "strawberry" },
  jay:       { emoji: "🍓", name: "strawberry",  cls: "strawberry" }
};
function getFruit() { return FRUIT_MAP[window._currentUser] || FRUIT_MAP.pragashri; }

function calcFruits() {
  let pts = 0;
  plan.forEach(w => w.problems.forEach((p, i) => {
    if (window._done[`${w.week}-${i}`])
      pts += p.diff === "E" ? 1 : p.diff === "M" ? 2 : 3;
  }));
  return pts;
}

function updateFruitBadge() {
  const f = getFruit();
  const pts = calcFruits();
  const badge = document.getElementById("fruit-badge");
  badge.className = `fruit-badge ${f.cls}`;
  badge.innerHTML = `${f.emoji} <span id="fruit-count">${pts}</span> pts`;
}

function spawnFruitFloat(x, y, pts) {
  const f = getFruit();
  const el = document.createElement("div");
  el.className = "fruit-float";
  el.style.cssText = `left:${x - 24}px;top:${y - 8}px;color:${f.cls === "strawberry" ? "#fb7185" : "#a3e635"}`;
  el.textContent = `+${pts} ${f.emoji}`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

const MILESTONES = [10, 25, 50, 100, 150, 200, 300];
let _lastMilestone = 0;
const SURPRISE_MSGS = [
  "YUMMY! 😋", "FRESH PICK! 🌿", "JUICY! 💦", "SO SWEET! 😍",
  "TASTY CODE! 🔥", "CRUNCH! 💪", "LEVEL UP! ⚡", "ON A ROLL! 🚀",
  "KEEP IT UP! 👏", "YOU'RE COOKING! 🍳", "LEGENDARY! 🏆", "SMASHED IT! 💥"
];

let _surpriseTimer = null;
window.hideSurprisePopup = function() {
  const overlay = document.getElementById("surprise-overlay");
  overlay.classList.remove("show");
  if (_surpriseTimer) { clearTimeout(_surpriseTimer); _surpriseTimer = null; }
};

function showSurprisePopup(pts) {
  const f = getFruit();
  const msg = SURPRISE_MSGS[Math.floor(Math.random() * SURPRISE_MSGS.length)];
  const ptsLabel = pts === 1 ? "1 point" : `${pts} points`;

  document.getElementById("surprise-main-emoji").textContent = f.emoji;
  document.getElementById("surprise-pts").textContent = `+${pts}`;
  document.getElementById("surprise-pts").className = `surprise-pts ${f.cls}`;
  document.getElementById("surprise-label").textContent = `${f.name} ${ptsLabel} earned!`;
  document.getElementById("surprise-msg").textContent = msg;

  // Scatter background fruits
  const bg = document.getElementById("surprise-bg-fruits");
  bg.innerHTML = "";
  const positions = [[10,10],[80,15],[5,70],[85,75],[45,5],[20,85],[70,50],[90,40],[15,45],[55,90]];
  positions.forEach(([l, t]) => {
    const s = document.createElement("span");
    s.className = "surprise-bg-fruit";
    s.textContent = f.emoji;
    s.style.cssText = `left:${l}%;top:${t}%;animation-delay:${Math.random()*3}s;animation-duration:${5+Math.random()*4}s`;
    bg.appendChild(s);
  });

  const overlay = document.getElementById("surprise-overlay");
  overlay.classList.add("show");
  if (_surpriseTimer) clearTimeout(_surpriseTimer);
  _surpriseTimer = setTimeout(hideSurprisePopup, 2200);
}

function checkFruitMilestone(total) {
  const f = getFruit();
  for (const m of MILESTONES) {
    if (total >= m && _lastMilestone < m) {
      _lastMilestone = m;
      showToast(`${f.emoji} ${m} ${f.name} points! Keep grinding!`);
      break;
    }
  }
}

// ── Toast ──
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 3200);
}

// ── Confetti ──
function celebrate(type) {
  if (typeof confetti === "undefined") return;
  if (type === "all") {
    confetti({ particleCount: 250, spread: 120, origin: { y: 0.5 }, colors: ["#22d3ee","#a78bfa","#34d399","#fbbf24"] });
    setTimeout(() => confetti({ particleCount: 150, spread: 80, origin: { x: 0.2, y: 0.6 } }), 300);
    setTimeout(() => confetti({ particleCount: 150, spread: 80, origin: { x: 0.8, y: 0.6 } }), 600);
  } else {
    confetti({ particleCount: 90, spread: 65, origin: { y: 0.65 }, colors: ["#22d3ee","#a78bfa","#34d399"] });
  }
}

// ── Progress ──
function updateProgress() {
  const n = Object.values(window._done).filter(Boolean).length;
  const pct = Math.round(n / TOTAL * 100);

  document.getElementById("stat-num").textContent = `${n} / ${TOTAL}`;
  document.getElementById("stat-lbl").textContent = `${pct}% complete`;
  document.getElementById("progress-bar-fill").style.width = pct + "%";
  document.getElementById("ring-pct").textContent = pct + "%";

  const offset = CIRCUMFERENCE - (pct / 100) * CIRCUMFERENCE;
  const ring = document.getElementById("ring-fill");
  ring.style.strokeDashoffset = offset;
  if (pct === 100) {
    ring.style.stroke = "#34d399";
    ring.style.filter = "drop-shadow(0 0 6px #34d399)";
  } else if (pct >= 60) {
    ring.style.stroke = "#a78bfa";
    ring.style.filter = "drop-shadow(0 0 4px #a78bfa)";
  } else {
    ring.style.stroke = "#22d3ee";
    ring.style.filter = "drop-shadow(0 0 4px #22d3ee)";
  }

  // Streak: consecutive fully-completed weeks from week 1
  let streak = 0;
  for (const w of plan) {
    if (w.problems.every((_, i) => window._done[`${w.week}-${i}`])) streak++;
    else break;
  }
  const badge = document.getElementById("streak-badge");
  badge.style.display = streak > 0 ? "flex" : "none";
  document.getElementById("streak-count").textContent = streak;

  updateFruitBadge();
}

// ── Render ──
function render() {
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";
  let lastPhase = "";

  const filtered = plan.filter(w => activeFilter === "All" || w.phase === activeFilter);

  if (filtered.length === 0) {
    const tr = document.createElement("tr");
    tr.className = "empty-row";
    tr.innerHTML = `<td colspan="5">// no results found</td>`;
    tbody.appendChild(tr);
    updateProgress();
    return;
  }

  filtered.forEach(w => {
    if (w.phase !== lastPhase) {
      lastPhase = w.phase;
      const tr = document.createElement("tr");
      tr.className = "phase-row";
      tr.innerHTML = `<td colspan="5"><span class="phase-label">${w.phase}</span></td>`;
      tbody.appendChild(tr);
    }

    const isOpen = !!window._expanded[w.week];
    const wDone = w.problems.filter((_, i) => window._done[`${w.week}-${i}`]).length;
    const isComplete = wDone === w.problems.length;
    const pct = Math.round(wDone / w.problems.length * 100);

    const tr = document.createElement("tr");
    tr.className = "week-row" + (isComplete ? " complete" : "");
    tr.innerHTML = `
      <td><span class="week-num">W${String(w.week).padStart(2,"0")}</span></td>
      <td>
        <div class="week-topic">${w.topic}</div>
        <div class="week-bar-wrap">
          <div class="week-bar-fill${isComplete?" full":""}" style="width:${pct}%"></div>
        </div>
      </td>
      <td><span class="week-days">days ${w.days}</span></td>
      <td>
        <div class="week-count-wrap">
          <span class="week-count">${w.problems.length} probs</span>
          <span class="expand-chevron${isOpen?" open":""}">▼</span>
        </div>
      </td>
      <td>
        <span class="done-pill${isComplete?" full":""}">
          ${isComplete ? "✓ DONE" : `${wDone}/${w.problems.length}`}
        </span>
      </td>
    `;
    tr.onclick = () => {
      window._expanded[w.week] = !window._expanded[w.week];
      render();
    };
    tbody.appendChild(tr);

    if (isOpen) {
      w.problems.forEach((p, i) => {
        const key = `${w.week}-${i}`;
        const isDone = !!window._done[key];
        const ptr = document.createElement("tr");
        ptr.className = "problem-row" + (isDone ? " done" : "");
        ptr.innerHTML = `
          <td style="padding-left:30px"><input type="checkbox" ${isDone?"checked":""} data-key="${key}"></td>
          <td colspan="2" class="p-name"><a class="p-link" href="${p.link}" target="_blank">${p.name} ↗</a></td>
          <td><span class="badge ${p.diff}">${p.diff==="E"?"easy":p.diff==="M"?"med":"hard"}</span></td>
          <td></td>
        `;
        ptr.querySelector("input").addEventListener("change", function(e) {
          e.stopPropagation();
          const wasWeekDone = w.problems.every((_, idx) => window._done[`${w.week}-${idx}`]);
          window._done[this.dataset.key] = this.checked;

          if (this.checked) {
            const pts = p.diff === "E" ? 1 : p.diff === "M" ? 2 : 3;
            const rect = this.getBoundingClientRect();
            spawnFruitFloat(rect.left + rect.width / 2, rect.top, pts);
            showSurprisePopup(pts);
            checkFruitMilestone(calcFruits());
          }
          const nowWeekDone = w.problems.every((_, idx) => window._done[`${w.week}-${idx}`]);
          const allDone = Object.values(window._done).filter(Boolean).length === TOTAL;

          if (!wasWeekDone && nowWeekDone) {
            if (allDone) {
              celebrate("all");
              showToast("🎉 ALL 150 COMPLETE. You're a beast.");
            } else {
              celebrate("week");
              showToast(`✓ Week ${w.week} complete — ${w.topic}`);
            }
          }
          updateProgress();
          render();
        });
        tbody.appendChild(ptr);
      });
    }
  });

  updateProgress();
}

// ── Filters ──
function buildFilters() {
  const phases = ["All","Phase 1 — Foundations","Phase 2 — Core DS","Phase 3 — Graphs & DP","Phase 4 — Polish & Mock"];
  const labels = ["all","phase_1","phase_2","phase_3","phase_4"];
  const wrap = document.getElementById("filters");
  wrap.innerHTML = "";
  phases.forEach((p, i) => {
    const btn = document.createElement("button");
    btn.className = "filter-btn" + (p === activeFilter ? " active" : "");
    btn.textContent = labels[i];
    btn.onclick = () => {
      activeFilter = p;
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      render();
    };
    wrap.appendChild(btn);
  });
}

// ── Firebase ──
window.saveToCloud = async function() {
  const { doc, setDoc } = window._firestore;
  const u = window._currentUser;
  try {
    document.getElementById("sync-status").textContent = "saving...";
    document.getElementById("sync-status").className = "sync-status";
    await setDoc(doc(db, "progress", u), { done: window._done });
    document.getElementById("sync-status").textContent = `saved · ${new Date().toLocaleTimeString()}`;
    document.getElementById("sync-status").className = "sync-status ok";
  } catch(e) {
    document.getElementById("sync-status").textContent = "error: connection failed";
    document.getElementById("sync-status").className = "sync-status err";
  }
};

window.loadFromCloud = async function() {
  const { doc, getDoc } = window._firestore;
  const u = window._currentUser;
  try {
    document.getElementById("sync-status").textContent = "loading...";
    document.getElementById("sync-status").className = "sync-status";
    const snap = await getDoc(doc(db, "progress", u));
    window._done = snap.exists() ? (snap.data().done || {}) : {};
    document.getElementById("sync-status").textContent = `synced · ${new Date().toLocaleTimeString()}`;
    document.getElementById("sync-status").className = "sync-status ok";
  } catch(e) {
    window._done = {};
    document.getElementById("sync-status").textContent = "error: load failed";
    document.getElementById("sync-status").className = "sync-status err";
  }
  render();
};

window.switchUser = async function(u) {
  window._currentUser = u;
  window._expanded = {};
  _lastMilestone = 0;
  document.getElementById("tab-pragashri").classList.toggle("active", u === "pragashri");
  document.getElementById("tab-jay").classList.toggle("active", u === "jay");
  document.getElementById("page-title").textContent =
    `${u === "jay" ? "Jay" : "Pragashri"}'s Tracker`;
  await loadFromCloud();
};

window.addEventListener("load", () => {
  buildFilters();
  const params = new URLSearchParams(location.search);
  switchUser(params.get("user") || "pragashri");
});
</script>
